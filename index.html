<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowDoc Editor</title>
    <link rel="stylesheet" href="./node_modules/highlight.js/styles/atom-one-dark-reasonable.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-lockup">
          <span class="brand-mark">F</span>
          <div>
            <h1>FlowDoc</h1>
            <p>更接近飞书风格的本地文档编辑器</p>
          </div>
        </div>

        <div class="entry-actions">
          <button id="newDocButton" type="button" class="primary-action">新建文档</button>
          <button id="openDocButton" type="button">打开文档</button>
          <button id="saveDocButton" type="button">立即保存</button>
        </div>

        <div class="sidebar-card">
          <div class="sidebar-card-head">
            <h2>当前标签</h2>
          </div>
          <div id="docTags" class="tag-list empty">打开文档后可以为它添加标签</div>
          <div class="tag-input-row">
            <input id="tagInput" type="text" placeholder="输入标签后回车或点击添加" />
            <button id="addTagButton" type="button">添加</button>
          </div>
        </div>

        <div class="sidebar-card outline-card">
          <div class="sidebar-card-head">
            <h2>文档目录</h2>
          </div>
          <div id="docOutline" class="outline-list empty">打开文档后会根据标题自动生成目录</div>
        </div>

        <div class="sidebar-card library-card">
          <div class="sidebar-card-head">
            <h2>本地文档库</h2>
            <button id="refreshLibraryButton" type="button">刷新</button>
          </div>
          <p id="libraryRootPath" class="library-root-path">正在读取文档库...</p>
          <input id="librarySearchInput" type="text" placeholder="按标题、路径或标签搜索" />
          <div id="libraryTagFilters" class="tag-filter-list"></div>
          <div id="libraryDocList" class="library-doc-list"></div>
        </div>

        <div class="sidebar-card muted">
          <h2>快捷键</h2>
          <p><kbd>Ctrl</kbd> + <kbd>S</kbd> 立即保存</p>
          <p>代码块支持语言切换和高亮渲染。</p>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="document-meta">
            <div class="eyebrow">当前文档</div>
            <div id="docName" class="document-name">未打开文档</div>
            <div id="docPath" class="document-path">请先新建或打开文档</div>
          </div>

          <div class="tip-banner">
            选中文本会弹出格式菜单；点击段落左侧的“+”可以插入图片、附件和代码块。
          </div>
        </header>

        <section class="workspace-body">
          <div id="emptyState" class="empty-state">
            <div class="empty-card">
              <h2>先选择文档位置，再开始编辑</h2>
              <p>文档可以放在任意位置，图片和附件会统一保存到程序目录下的资源文件夹中。</p>
            </div>
          </div>

          <div id="editorSurface" class="editor-surface hidden">
            <div id="selectionBubble" class="selection-bubble hidden">
              <button type="button" data-block="h1">标题 1</button>
              <button type="button" data-block="h2">标题 2</button>
              <button type="button" data-block="h3">标题 3</button>
              <button type="button" data-command="bold">加粗</button>
              <button type="button" data-command="italic">斜体</button>
              <button type="button" data-command="underline">下划线</button>
              <button type="button" data-command="strikeThrough">删除线</button>
              <button type="button" class="selection-inline-code-button" data-special="inline-code">行内代码</button>
              <button type="button" data-command="insertUnorderedList">无序列表</button>
              <button type="button" data-command="insertOrderedList">有序列表</button>
              <button type="button" data-block="blockquote">引用</button>
              <button type="button" data-special="code-block">代码块</button>
              <button
                type="button"
                class="selection-color-button"
                data-color="#b65a3a"
                style="--selection-color: #b65a3a"
                aria-label="暖棕色"
                title="暖棕色"
              ></button>
              <button
                type="button"
                class="selection-color-button"
                data-color="#d06363"
                style="--selection-color: #d06363"
                aria-label="柔红色"
                title="柔红色"
              ></button>
              <button
                type="button"
                class="selection-color-button"
                data-color="#3f6fd1"
                style="--selection-color: #3f6fd1"
                aria-label="海蓝色"
                title="海蓝色"
              ></button>
              <button
                type="button"
                class="selection-color-button"
                data-color="#2f8b57"
                style="--selection-color: #2f8b57"
                aria-label="松绿色"
                title="松绿色"
              ></button>
            </div>

            <div id="blockHandle" class="block-handle hidden">
              <button id="blockHandleButton" class="block-handle-button" type="button" aria-label="插入内容">
                +
              </button>

              <div id="insertMenu" class="insert-menu hidden">
                <button type="button" data-insert="image">插入图片</button>
                <button type="button" data-insert="attachment">上传附件</button>
                <button type="button" data-insert="code-block">代码块</button>
                <button type="button" data-insert="quote">引用块</button>
              </div>
            </div>

            <div id="editor" class="editor" contenteditable="true"></div>
          </div>
        </section>

        <footer class="statusbar">
          <span id="statusText">等待打开文档。</span>
        </footer>
      </main>
    </div>

    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

    <div id="imageContextMenu" class="image-context-menu hidden" role="menu" aria-hidden="true">
      <button type="button" data-image-menu-action="save-as">图片另存为</button>
      <button type="button" data-image-menu-action="open">打开图片</button>
      <button type="button" data-image-menu-action="reveal">在资源管理器中显示</button>
    </div>

    <div id="attachmentPreviewModal" class="preview-modal hidden" aria-hidden="true">
      <div class="preview-modal-backdrop" data-preview-close></div>
      <section class="preview-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="attachmentPreviewTitle">
        <header class="preview-modal-head">
          <div class="preview-modal-copy">
            <div class="preview-modal-eyebrow">附件预览</div>
            <h2 id="attachmentPreviewTitle">未选择附件</h2>
            <p id="attachmentPreviewMeta" class="preview-modal-meta"></p>
          </div>

          <div class="preview-modal-actions">
            <button id="attachmentPreviewDownload" type="button">下载到 Downloads</button>
            <button id="attachmentPreviewClose" type="button">关闭</button>
          </div>
        </header>

        <div id="attachmentPreviewBody" class="preview-modal-body"></div>
      </section>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
